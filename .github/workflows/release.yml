name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test
      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          cargo install tauri-cli --locked
          cargo tauri build --bundles deb,appimage
      - name: Generate latest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Files in appimage dir:"
          ls -la src-tauri/target/release/bundle/appimage/ || echo "appimage dir missing"
          APPIMAGE_PATH=$(ls src-tauri/target/release/bundle/appimage/*.AppImage)
          APPIMAGE_SIG=$(cat "${APPIMAGE_PATH}.sig")
          APPIMAGE_NAME=$(basename "$APPIMAGE_PATH")
          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See the assets for details.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "linux-x86_64": {
                "url": "https://github.com/minhtranin/mogy/releases/download/${GITHUB_REF_NAME}/${APPIMAGE_NAME}",
                "signature": "${APPIMAGE_SIG}"
              }
            }
          }
          EOF
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Mogy ${{ github.ref_name }}" \
            --notes "See the assets to download this version and install." \
            src-tauri/target/release/bundle/deb/*.deb \
            src-tauri/target/release/bundle/appimage/*.AppImage \
            src-tauri/target/release/bundle/appimage/*.AppImage.sig \
            latest.json
