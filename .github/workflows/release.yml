name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test
      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          cargo install tauri-cli --locked
          cargo tauri build --bundles deb,appimage
      - name: Generate latest.json
        run: |
          # Strip 'v' prefix and fix invalid semver (remove leading zeros like 03 -> 3)
          RAW_VERSION="${GITHUB_REF_NAME#v}"
          # Use printf to properly format the version (removes leading zeros from patch)
          VERSION=$(printf '%s' "$RAW_VERSION" | sed -E 's/\.0+([0-9]+)/.\1/g')
          echo "Using version: $VERSION"
          echo "Files in appimage dir:"
          ls -la src-tauri/target/release/bundle/appimage/ || echo "appimage dir missing"
          APPIMAGE_PATH=$(ls src-tauri/target/release/bundle/appimage/*.AppImage)
          APPIMAGE_SIG=$(cat "${APPIMAGE_PATH}.sig")
          APPIMAGE_NAME=$(basename "$APPIMAGE_PATH")
          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See the assets for details.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "linux-x86_64": {
                "url": "https://github.com/minhtranin/mogy/releases/download/${GITHUB_REF_NAME}/${APPIMAGE_NAME}",
                "signature": "${APPIMAGE_SIG}"
              }
            }
          }
          EOF
      - name: Extract changelog
        id: changelog
        run: |
          VERSION_NO_V="${GITHUB_REF_NAME#v}"
          # Try [Unreleased] first, then fall back to matching version
          NOTES=$(awk '/^## \[Unreleased\]/{found=1; next} found && /^## /{exit} found{print}' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES=$(awk "/^## \[${VERSION_NO_V}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          gh release delete ${{ github.ref_name }} --yes --cleanup-tag 2>/dev/null || true
          gh release create ${{ github.ref_name }} \
            --title "Mogy ${{ github.ref_name }}" \
            --notes "$RELEASE_NOTES" \
            src-tauri/target/release/bundle/deb/*.deb \
            src-tauri/target/release/bundle/appimage/*.AppImage \
            src-tauri/target/release/bundle/appimage/*.AppImage.sig \
            latest.json
